<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">MagAgent local cockpit screenshot mockup</title>
  <desc id="desc">A static mockup of the MagAgent cockpit showing workspace status, plans, memory inbox, recipes, sandbox runs, and release checks.</desc>
  <rect width="1200" height="760" fill="#f6f7f9"/>
  <rect x="0" y="0" width="1200" height="76" fill="#1f2937"/>
  <text x="36" y="48" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">MagAgent UI</text>
  <text x="232" y="48" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="15">/projects/magagent</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="32" y="104" width="352" height="174" rx="8" fill="#ffffff" stroke="#d8dde6"/>
    <text x="56" y="138" font-size="18" font-weight="700" fill="#111827">Workspace</text>
    <text x="56" y="172" font-size="42" font-weight="700" fill="#0f766e">clean</text>
    <text x="56" y="210" font-size="15" fill="#4b5563">0 untracked files · 0 risky cleanup items</text>
    <rect x="56" y="230" width="128" height="30" rx="6" fill="#ecfeff" stroke="#67e8f9"/>
    <text x="76" y="251" font-size="13" fill="#155e75">Release check</text>
    <rect x="424" y="104" width="352" height="174" rx="8" fill="#ffffff" stroke="#d8dde6"/>
    <text x="448" y="138" font-size="18" font-weight="700" fill="#111827">Pending Plans</text>
    <text x="448" y="172" font-size="42" font-weight="700" fill="#7c3aed">3</text>
    <text x="448" y="210" font-size="15" fill="#4b5563">sandbox previews ready</text>
    <rect x="448" y="230" width="116" height="30" rx="6" fill="#f5f3ff" stroke="#c4b5fd"/>
    <text x="468" y="251" font-size="13" fill="#5b21b6">Plan sandbox</text>
    <rect x="816" y="104" width="352" height="174" rx="8" fill="#ffffff" stroke="#d8dde6"/>
    <text x="840" y="138" font-size="18" font-weight="700" fill="#111827">Memory Inbox</text>
    <text x="840" y="172" font-size="42" font-weight="700" fill="#b45309">7</text>
    <text x="840" y="210" font-size="15" fill="#4b5563">review before MagGraph write</text>
    <rect x="840" y="230" width="104" height="30" rx="6" fill="#fff7ed" stroke="#fdba74"/>
    <text x="861" y="251" font-size="13" fill="#9a3412">Promote</text>
    <rect x="32" y="312" width="544" height="376" rx="8" fill="#ffffff" stroke="#d8dde6"/>
    <text x="56" y="346" font-size="18" font-weight="700" fill="#111827">Recipes</text>
    <text x="56" y="388" font-size="15" fill="#111827">release-prep</text>
    <text x="56" y="420" font-size="15" fill="#111827">bug-triage</text>
    <text x="56" y="452" font-size="15" fill="#111827">docs-audit</text>
    <text x="56" y="484" font-size="15" fill="#111827">dependency-upgrade</text>
    <line x1="56" y1="514" x2="552" y2="514" stroke="#e5e7eb"/>
    <text x="56" y="552" font-size="18" font-weight="700" fill="#111827">Sandbox Runs</text>
    <text x="56" y="590" font-size="15" fill="#166534">passed · plan_0009 · worktree</text>
    <text x="56" y="622" font-size="15" fill="#991b1b">failed · plan_0010 · container</text>
    <rect x="624" y="312" width="544" height="376" rx="8" fill="#ffffff" stroke="#d8dde6"/>
    <text x="648" y="346" font-size="18" font-weight="700" fill="#111827">Release Check</text>
    <text x="648" y="388" font-size="15" fill="#166534">tests · passed</text>
    <text x="648" y="420" font-size="15" fill="#166534">lint · passed</text>
    <text x="648" y="452" font-size="15" fill="#166534">docs · passed</text>
    <line x1="648" y1="484" x2="1144" y2="484" stroke="#e5e7eb"/>
    <text x="648" y="522" font-size="18" font-weight="700" fill="#111827">GitHub</text>
    <text x="648" y="560" font-size="15" fill="#4b5563">open PRs · issue triage · checks via gh</text>
    <text x="648" y="600" font-size="18" font-weight="700" fill="#111827">Browser</text>
    <text x="648" y="638" font-size="15" fill="#4b5563">snapshot and screenshot tools via Playwright</text>
  </g>
</svg>
